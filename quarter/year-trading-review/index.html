<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="8; url=../../monthly-quarterly-trading-review/" />
  <title>长期复盘入口已拆分</title>
  <style>
    :root{--panel:#fff;--ink:#1c2530;--muted:#667085;--line:#dfe4ea;--accent:#c2412d;--accent-soft:#fff1ed;--shadow:0 18px 44px rgba(28,37,48,.08);--radius:12px}
    *{box-sizing:border-box}body{margin:0;color:var(--ink);background:linear-gradient(180deg,#f7f8fa 0%,#eef2f5 100%);font-family:"Avenir Next","PingFang SC","Noto Sans SC","Microsoft YaHei",Arial,sans-serif}.shell{width:min(920px,calc(100vw - 28px));min-height:100vh;margin:0 auto;padding:64px 0;display:grid;place-items:center}.panel{width:100%;background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:30px}.label{display:inline-flex;width:max-content;color:var(--accent);background:var(--accent-soft);padding:7px 10px;border-radius:999px;font-size:12px;font-weight:700}h1{margin:14px 0 12px;font-size:clamp(34px,5vw,54px);line-height:1.05;letter-spacing:0}p{color:var(--muted);line-height:1.72}.links{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:22px}.card{display:grid;gap:10px;text-decoration:none;color:inherit;border:1px solid var(--line);border-radius:10px;padding:18px;background:#fff}.card:hover{border-color:#cbd5e1}.button-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}.button{display:inline-flex;justify-content:center;align-items:center;min-height:44px;padding:0 16px;border-radius:8px;background:var(--ink);color:#fff;text-decoration:none;font-weight:700}.button.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}@media(max-width:720px){.links{grid-template-columns:1fr}.shell{width:min(100vw - 16px,920px);padding:24px 0}.panel{padding:20px}}
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <span class="label">入口已拆分</span>
      <h1>季度 / 年度复盘已拆成两个主页</h1>
      <p>这个旧入口会保留一段时间，避免旧链接失效。现在月度和季度放在同一个主页，年度复盘单独放在年度主页。页面会在 8 秒后自动前往月度 / 季度主页。</p>
      <div class="links">
        <a class="card" href="../../monthly-quarterly-trading-review/">
          <strong>月度 / 季度交易复盘</strong>
          <span>每月汇总周度结果，每季度检查模式和仓位是否真正改善账户曲线。</span>
        </a>
        <a class="card" href="../../yearly-trading-review/">
          <strong>年度交易复盘</strong>
          <span>年度层面沉淀账户画像、模式进化、风控纪律和下一年执行准则。</span>
        </a>
      </div>
      <div class="button-row">
        <a class="button" href="../../monthly-quarterly-trading-review/">去月度 / 季度主页</a>
        <a class="button secondary" href="../../yearly-trading-review/">去年度主页</a>
        <a class="button secondary" href="../../index.html">返回总首页</a>
      </div>
    </section>
  </main>
</body>
</html>
